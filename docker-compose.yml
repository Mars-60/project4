services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tradepilot
      POSTGRES_USER: tradepilot
      POSTGRES_PASSWORD: tradepilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradepilot -d tradepilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: production
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      DATABASE_URL: postgres://tradepilot:tradepilot@postgres:5432/tradepilot?sslmode=disable
      JWT_SECRET: change-this-before-deploy
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
