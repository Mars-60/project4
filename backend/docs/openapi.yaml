openapi: 3.0.3
info:
  title: TradePilot AI API
  version: v0.1.0
paths:
  /api/v1/health:
    get:
      responses:
        "200":
          description: Service health
  /api/v1/version:
    get:
      responses:
        "200":
          description: Service version
  /api/v1/auth/register:
    post:
      responses:
        "201":
          description: Registered user and token pair
  /api/v1/auth/login:
    post:
      responses:
        "200":
          description: Authenticated user and token pair
  /api/v1/auth/refresh:
    post:
      responses:
        "200":
          description: Rotated access and refresh token pair
  /api/v1/auth/logout:
    post:
      responses:
        "200":
          description: Revoked refresh session
  /api/v1/auth/me:
    get:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current JWT claims
  /api/v1/strategies:
    get:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Strategy list
    post:
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Created strategy
  /api/v1/strategies/{id}/enable:
    post:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Strategy enabled
  /api/v1/strategies/{id}/disable:
    post:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Strategy disabled
  /api/v1/strategies/{id}/explain:
    post:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: AI strategy explanation
  /api/v1/orders:
    get:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Orders
  /api/v1/trades:
    get:
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        "200":
          description: Trades
  /api/v1/paper/orders:
    post:
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Paper order
  /api/v1/portfolio/summary:
    get:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Portfolio summary with PnL and exposure
  /api/v1/portfolio/positions:
    get:
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: paper
          schema:
            type: boolean
      responses:
        "200":
          description: Open positions
  /api/v1/portfolio/holdings:
    get:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Holdings
  /api/v1/funds:
    get:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Funds and paper balance
  /api/v1/market/quote:
    get:
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: exchange
          required: true
          schema:
            type: string
        - in: query
          name: symbol_token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Broker-backed market quote
  /api/v1/ai/ask:
    post:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: AI assistant answer
  /api/v1/ai/portfolio:
    post:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: AI portfolio analysis
  /api/v1/ai/market:
    post:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: AI market explanation
  /api/v1/ai/risk:
    post:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: AI risk explanation
  /api/v1/notifications:
    get:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Notifications
    post:
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Queued or sent notification
  /api/v1/system/metrics:
    get:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Runtime metrics hook
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
